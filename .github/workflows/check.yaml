name: Format & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11.10

      - name: Install PNPM packages
        run: pnpm ci

      - name: Run Prettier
        run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11.10

      - name: Install PNPM packages
        run: pnpm ci

      - name: Run ESLint
        run: pnpm lint
